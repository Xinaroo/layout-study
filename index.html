<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Study</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 공통 카드 ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .card h1 { font-size: 22px; margin-bottom: 12px; color: #111; }
    .card h2 { font-size: 20px; margin-bottom: 16px; color: #111; }
    .card p  { font-size: 14px; color: #555; line-height: 1.8; margin-bottom: 24px; }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .badge-ind  { background: #EEF2FF; color: #4338CA; }
    .badge-prox { background: #FFF7ED; color: #C2410C; }
    .badge-rel  { background: #F0FDF4; color: #15803D; }
    .badge-low  { background: #FEF2F2; color: #B91C1C; }

    .desc-box {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 14px;
      color: #333;
      line-height: 1.8;
      text-align: left;
      margin-bottom: 28px;
    }

    .desc-box strong { color: #111; }

    /* ── 입력 ── */
    #participantId {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    #participantId:focus { border-color: #4A90E2; }

    /* ── 공통 버튼 ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      background: #4A90E2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #357ABD; }
    .btn-primary:disabled { background: #cfd8e3; cursor: not-allowed; }

    .btn-secondary {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      background: white;
      color: #4A90E2;
      border: 1.5px solid #4A90E2;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: #f0f6ff; }

    /* ── 스텝 인디케이터 ── */
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ddd;
    }
    .step-dot.active { background: #4A90E2; }

    /* ── 진행 화면 ── */
    #studyScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 980px;
      padding: 24px 16px;
    }

    #progressBar {
      width: 100%;
      max-width: 840px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      background: #4A90E2;
      border-radius: 3px;
      transition: width 0.3s;
    }
    #progressText {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    /* 이미지 영역: 기존 대비 약 2배 폭 */
    #imageContainer {
      width: 100%;
      max-width: 840px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }
    #layoutImage { width: 100%; height: auto; display: block; }

    #choiceRow {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 840px;
      margin-bottom: 24px;
    }
    .choice-btn {
      flex: 1;
      padding: 18px 8px;
      font-size: 16px;
      font-weight: 600;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: all 0.15s;
      color: #333;
    }
    .choice-btn:hover  { border-color: #4A90E2; color: #4A90E2; background: #f0f6ff; }
    .choice-btn.selected { border-color: #4A90E2; background: #4A90E2; color: white; }

    /* ── confidence 척도 ── */
    #confidenceBox {
      width: 100%;
      max-width: 840px;
      background: white;
      border-radius: 10px;
      padding: 18px 24px 22px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      margin-bottom: 20px;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #confidenceBox.enabled { opacity: 1; pointer-events: auto; }
    #confidenceBox .conf-label {
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      text-align: left;
    }
    #confidenceScale {
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }
    .conf-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .conf-circle {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid #ddd;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #888;
      transition: all 0.15s;
    }
    .conf-item:hover .conf-circle { border-color: #4A90E2; }
    .conf-item.selected .conf-circle { background: #4A90E2; border-color: #4A90E2; color: white; }
    .conf-caption { font-size: 11px; color: #999; }

    #nextBtnWrap {
      width: 100%;
      max-width: 840px;
    }

    /* ── 완료 화면 ── */
    #doneScreen {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    #doneScreen h2 { font-size: 22px; margin-bottom: 12px; }
    #doneScreen p  { font-size: 14px; color: #555; line-height: 1.7; }

    .spinner {
      display: none;
      width: 28px; height: 28px;
      border: 3px solid #e0e0e0;
      border-top-color: #4A90E2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 리뷰 화면 ── */
    #reviewScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 980px;
      padding: 24px 16px;
    }
    #reviewHeader {
      width: 100%;
      max-width: 900px;
      text-align: center;
      margin-bottom: 20px;
    }
    #reviewHeader h1 { font-size: 22px; margin-bottom: 8px; color: #111; }
    #reviewHeader p { font-size: 13px; color: #777; }

    #reviewTabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }
    .review-tab {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 20px;
      border: 1.5px solid #ddd;
      background: white;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .review-tab.active { border-color: #4A90E2; background: #4A90E2; color: white; }
    .review-tab.low { border-color: #fca5a5; }
    .review-tab.low.active { background: #DC2626; border-color: #DC2626; }

    #reviewGrid {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .review-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.12s;
    }
    .review-card:hover { transform: translateY(-2px); }
    .review-card img { width: 100%; height: auto; display: block; }
    .review-card .review-card-info {
      padding: 8px 10px;
      font-size: 12px;
      color: #666;
      display: flex;
      justify-content: space-between;
    }
    .review-card .conf-pill {
      padding: 1px 8px;
      border-radius: 10px;
      font-weight: 700;
      background: #f1f1f1;
    }
    .review-card .conf-pill.lowval { background: #FEF2F2; color: #B91C1C; }

    #reviewEmpty {
      font-size: 14px;
      color: #999;
      padding: 60px 0;
    }

    #reviewFooter {
      display: flex;
      gap: 12px;
    }

    /* ── 확대 모달 ── */
    #imgModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 30px;
    }
    #imgModal img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 8px;
    }
    #imgModalClose {
      position: absolute;
      top: 24px; right: 32px;
      color: white;
      font-size: 28px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ── 1. 시작 화면 ── -->
<div id="startScreen" class="card">
  <h1>Layout Classification Study</h1>
  <p>
    화면에 나타나는 레이아웃 이미지를 보고<br>
    세 가지 유형 중 하나로 분류하는 실험입니다.<br><br>
    시작 전에 각 유형에 대한 설명을 읽어주세요.
  </p>
  <input id="participantId" type="text" placeholder="참가자 ID를 입력하세요" />
  <button class="btn-primary" onclick="goToInstruction(0)">다음 →</button>
</div>

<!-- ── 2. 설명 화면 (3페이지) ── -->
<div id="instructionScreen" class="card" style="display:none;">
  <div class="step-indicator">
    <div class="step-dot" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
  </div>
  <div id="instructionContent"></div>
  <button class="btn-primary" id="instructionNextBtn" onclick="nextInstruction()">다음 →</button>
</div>

<!-- ── 3. 진행 화면 ── -->
<div id="studyScreen">
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="progressText"></div>
  <div id="imageContainer">
    <img id="layoutImage" src="" alt="layout" />
  </div>
  <div id="choiceRow">
    <button class="choice-btn" onclick="selectChoice('Independent')">Independent</button>
    <button class="choice-btn" onclick="selectChoice('Proximal')">Proximal</button>
    <button class="choice-btn" onclick="selectChoice('Relational')">Relational</button>
  </div>

  <div id="confidenceBox">
    <div class="conf-label">이 분류에 대해 얼마나 확신하시나요? (1 = 전혀 확신 없음, 7 = 매우 확신함)</div>
    <div id="confidenceScale"></div>
  </div>

  <div id="nextBtnWrap">
    <button class="btn-primary" id="goNextBtn" disabled onclick="goNext()">다음 →</button>
  </div>
</div>

<!-- ── 4. 리뷰 화면 ── -->
<div id="reviewScreen">
  <div id="reviewHeader">
    <h1>분류 결과 확인</h1>
    <p>탭을 눌러 카테고리별로 모아보거나, 확신도가 낮았던(1~3점) 항목만 따로 확인할 수 있습니다.</p>
  </div>
  <div id="reviewTabs">
    <button class="review-tab active" data-tab="Independent" onclick="switchTab('Independent')">Independent</button>
    <button class="review-tab" data-tab="Proximal" onclick="switchTab('Proximal')">Proximal</button>
    <button class="review-tab" data-tab="Relational" onclick="switchTab('Relational')">Relational</button>
    <button class="review-tab low" data-tab="LowConfidence" onclick="switchTab('LowConfidence')">확신도 낮음 (1~3점)</button>
  </div>
  <div id="reviewGrid"></div>
  <div id="reviewFooter">
    <button class="btn-secondary" onclick="goBackToStudyEnd()">← 분류 화면으로 돌아가기</button>
    <button class="btn-primary" style="width:auto; padding:10px 24px;" onclick="submitResponses()">최종 제출하기</button>
  </div>
</div>

<!-- ── 확대 모달 ── -->
<div id="imgModal" onclick="closeModal(event)">
  <span id="imgModalClose">&times;</span>
  <img id="imgModalImage" src="" alt="enlarged" />
</div>

<!-- ── 5. 완료 화면 ── -->
<div id="doneScreen">
  <h2>완료되었습니다.</h2>
  <p>참여해주셔서 감사합니다.<br>응답이 저장되었습니다.</p>
  <div class="spinner" id="spinner"></div>
</div>

<script>
  // ============================================================
  // ★ 여기만 수정하세요
  // ============================================================
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoFFOLJRG-Tkq70PUfuiPtHzWrMiaanPAwUQOhvuce90rD5flzLP80zAd4R8auQn8H/exec";

  const IMAGES = Array.from({ length: 60 }, (_, i) =>
    `images/layout_${String(i + 1).padStart(2, "0")}.jpg`
  );
  // ============================================================

  // 설명 3페이지 내용
  const INSTRUCTIONS = [
    {
      badge: "Independent",
      badgeClass: "badge-ind",
      title: "Independent",
      content: `
        <strong>초록색 outline으로 표시된 물체가 가상 물체입니다.</strong><br><br>
        Independent 배치에서는 가상 물체가 주변 실제 물체들과
        특별한 공간적 관계를 맺지 않습니다.<br><br>
        어느 물체 옆에 붙어있지도 않고, 물체들 사이에 끼어있지도 않으며,
        전체 배치의 중심에 있지도 않습니다.<br><br>
        가상 물체가 전체 배치 구조를 해석하는 데 특별한 기준점을 제공하지 않는 배치입니다.
      `
    },
    {
      badge: "Proximal",
      badgeClass: "badge-prox",
      title: "Proximal",
      content: `
        <strong>초록색 outline으로 표시된 물체가 가상 물체입니다.</strong><br><br>
        Proximal 배치에서는 가상 물체가 하나의 실제 물체와
        가까이 붙어있습니다.<br><br>
        특정 물체 한 개와 짝을 이루는 느낌이 나며,
        나머지 물체들과는 거리가 있습니다.<br><br>
        핵심은 <strong>"사이"가 아닌 "가까움"</strong>입니다.
        두 물체 사이에 끼어있는 것이 아니라,
        한 물체 옆에 붙어있는 배치입니다.
      `
    },
    {
      badge: "Relational",
      badgeClass: "badge-rel",
      title: "Relational",
      content: `
        <strong>초록색 outline으로 표시된 물체가 가상 물체입니다.</strong><br><br>
        Relational 배치에서는 가상 물체가 여러 실제 물체들과 함께
        하나의 전체적인 형태나 패턴을 이룹니다.<br><br>
        L자형 배치, 원형 배치 등 전체 구조 안에서
        가상 물체가 관계적 위치를 차지합니다.<br><br>
        가상 물체가 <strong>전체 배치의 일부</strong>로서
        구조적 역할을 하는 배치입니다.
      `
    }
  ];

  let currentInstruction = 0;
  let participantId = "";
  let imageOrder    = [];
  let responses     = {};   // { num: { category, confidence } }
  let currentIndex  = 0;
  let currentCategory = null;
  let currentConfidence = null;
  let currentReviewTab = "Independent";

  function goToInstruction(idx) {
    const input = document.getElementById("participantId").value.trim();
    if (!input) {
      alert("참가자 ID를 입력해주세요.");
      return;
    }
    participantId = input;

    document.getElementById("startScreen").style.display      = "none";
    document.getElementById("instructionScreen").style.display = "block";
    showInstruction(idx);
  }

  function showInstruction(idx) {
    currentInstruction = idx;
    const inst = INSTRUCTIONS[idx];

    document.querySelectorAll(".step-dot").forEach((d, i) => {
      d.classList.toggle("active", i === idx);
    });

    document.getElementById("instructionContent").innerHTML = `
      <span class="badge ${inst.badgeClass}">${inst.badge}</span>
      <h2>${inst.title}</h2>
      <div class="desc-box">${inst.content}</div>
    `;

    const btn = document.getElementById("instructionNextBtn");
    btn.textContent = idx === INSTRUCTIONS.length - 1 ? "실험 시작하기 →" : "다음 →";
  }

  function nextInstruction() {
    if (currentInstruction < INSTRUCTIONS.length - 1) {
      showInstruction(currentInstruction + 1);
    } else {
      startStudy();
    }
  }

  function startStudy() {
    imageOrder   = shuffle(IMAGES);
    currentIndex = 0;
    responses    = {};

    buildConfidenceScale();

    document.getElementById("instructionScreen").style.display = "none";
    document.getElementById("studyScreen").style.display       = "flex";
    showImage();
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildConfidenceScale() {
    const wrap = document.getElementById("confidenceScale");
    wrap.innerHTML = "";
    for (let i = 1; i <= 7; i++) {
      const item = document.createElement("div");
      item.className = "conf-item";
      item.dataset.value = i;
      item.onclick = () => selectConfidence(i);

      const circle = document.createElement("div");
      circle.className = "conf-circle";
      circle.textContent = i;

      const caption = document.createElement("div");
      caption.className = "conf-caption";
      caption.textContent = i === 1 ? "확신 없음" : (i === 7 ? "매우 확신" : "");

      item.appendChild(circle);
      item.appendChild(caption);
      wrap.appendChild(item);
    }
  }

  function showImage() {
    const total = imageOrder.length;
    document.getElementById("progressFill").style.width  = (currentIndex / total * 100) + "%";
    document.getElementById("progressText").textContent  = `${currentIndex + 1} / ${total}`;
    document.getElementById("layoutImage").src           = imageOrder[currentIndex];

    document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
    document.querySelectorAll(".conf-item").forEach(c => c.classList.remove("selected"));
    document.getElementById("confidenceBox").classList.remove("enabled");
    document.getElementById("goNextBtn").disabled = true;

    currentCategory   = null;
    currentConfidence = null;

    // 이미 답한 적이 있다면 (review에서 돌아온 경우) 복원
    const num = imageOrder[currentIndex].match(/(\d+)/)[1];
    const prev = responses[num];
    if (prev) {
      currentCategory = prev.category;
      currentConfidence = prev.confidence;
      document.querySelectorAll(".choice-btn").forEach(b => {
        if (b.textContent === prev.category) b.classList.add("selected");
      });
      document.getElementById("confidenceBox").classList.add("enabled");
      document.querySelectorAll(".conf-item").forEach(c => {
        if (parseInt(c.dataset.value) === prev.confidence) c.classList.add("selected");
      });
      document.getElementById("goNextBtn").disabled = false;
    }
  }

  function selectChoice(category) {
    document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
    event.target.classList.add("selected");
    currentCategory = category;

    document.getElementById("confidenceBox").classList.add("enabled");
    updateNextEnabled();
  }

  function selectConfidence(val) {
    document.querySelectorAll(".conf-item").forEach(c => c.classList.remove("selected"));
    document.querySelector(`.conf-item[data-value="${val}"]`).classList.add("selected");
    currentConfidence = val;
    updateNextEnabled();
  }

  function updateNextEnabled() {
    document.getElementById("goNextBtn").disabled = !(currentCategory && currentConfidence);
  }

  function goNext() {
    if (!currentCategory || !currentConfidence) return;

    const imgPath = imageOrder[currentIndex];
    const num = imgPath.match(/(\d+)/)[1];
    responses[num] = { category: currentCategory, confidence: currentConfidence };

    currentIndex++;
    if (currentIndex < imageOrder.length) {
      showImage();
    } else {
      showReviewScreen();
    }
  }

  // ── 리뷰 화면 ──
  function showReviewScreen() {
    document.getElementById("studyScreen").style.display  = "none";
    document.getElementById("reviewScreen").style.display = "flex";
    switchTab(currentReviewTab);
  }

  function goBackToStudyEnd() {
    document.getElementById("reviewScreen").style.display = "none";
    document.getElementById("studyScreen").style.display  = "flex";
    currentIndex = imageOrder.length - 1;
    showImage();
  }

  function switchTab(tab) {
    currentReviewTab = tab;
    document.querySelectorAll(".review-tab").forEach(t => {
      t.classList.toggle("active", t.dataset.tab === tab);
    });

    const grid = document.getElementById("reviewGrid");
    grid.innerHTML = "";

    let entries = Object.entries(responses); // [num, {category, confidence}]

    if (tab === "LowConfidence") {
      entries = entries.filter(([num, r]) => r.confidence <= 3);
    } else {
      entries = entries.filter(([num, r]) => r.category === tab);
    }

    if (entries.length === 0) {
      grid.innerHTML = `<div id="reviewEmpty">해당하는 항목이 없습니다.</div>`;
      return;
    }

    entries.sort((a, b) => parseInt(a[0]) - parseInt(b[0]));

    entries.forEach(([num, r]) => {
      const imgSrc = `images/layout_${num.padStart(2, "0")}.jpg`;
      const card = document.createElement("div");
      card.className = "review-card";
      card.onclick = () => openModal(imgSrc);

      const lowClass = r.confidence <= 3 ? "lowval" : "";
      card.innerHTML = `
        <img src="${imgSrc}" alt="layout ${num}">
        <div class="review-card-info">
          <span>#${num} · ${r.category}</span>
          <span class="conf-pill ${lowClass}">conf ${r.confidence}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function openModal(src) {
    document.getElementById("imgModalImage").src = src;
    document.getElementById("imgModal").style.display = "flex";
  }

  function closeModal(e) {
    if (e.target.id === "imgModal" || e.target.id === "imgModalClose") {
      document.getElementById("imgModal").style.display = "none";
    }
  }

  // ── 제출 ──
  async function submitResponses() {
    document.getElementById("reviewScreen").style.display = "none";
    document.getElementById("doneScreen").style.display   = "flex";
    document.getElementById("spinner").style.display      = "block";

    const payload = {
      participantId,
      imageOrder: imageOrder.map(img => img.match(/(\d+)/)[1]),
      responses, // { num: { category, confidence } }
    };

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload),
      });
      console.log("전송 완료");
    } catch (err) {
      console.error("전송 실패:", err);
    }

    document.getElementById("spinner").style.display = "none";
  }
</script>
